<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina - Luna y Marea</title>
    <style>
        :root {
            --bg-color: #01040a;
            --text-main: #ffffff;
            --text-muted: #8ab4f8;
            --neon-blue: #00e5ff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 100%, #0d2240 0%, #01040a 70%);
        }

        header, .moon-section {
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Night_Sky_with_Clouds.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        header { text-align: center; padding: 20px 10px 10px; z-index: 10; background-color: rgba(1, 4, 10, 0.3); }
        h1 { font-size: 14px; font-weight: 600; letter-spacing: 1px; color: var(--text-main); text-transform: uppercase; }
        #date-display { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-top: 5px; letter-spacing: 0.5px; text-transform: uppercase; }

        .moon-section {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 20px;
            background-color: rgba(1, 4, 10, 0.2); 
        }
        .moon-visual {
            width: 180px; height: 180px; border-radius: 50%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
            background-size: cover; background-position: center;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), inset -20px -20px 40px rgba(0,0,0,0.8);
            position: relative; margin-bottom: 20px; overflow: hidden;
        }

        .moon-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            transition: transform 0.1s linear, background 0.1s linear;
        }

        .phase-title { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
        .phase-name { font-size: 20px; font-weight: 600; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .illumination { font-size: 16px; font-weight: 300; }

        .tide-section {
            flex: 1; background: rgba(0, 40, 80, 0.2); border-top-left-radius: 30px; border-top-right-radius: 30px;
            backdrop-filter: blur(10px); padding: 20px 0; position: relative; display: flex; flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .tide-header { text-align: center; margin-bottom: 10px; }
        
        .scroll-container {
            width: 100%; height: 140px; overflow-x: auto; overflow-y: hidden; 
            scroll-behavior: auto; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; position: relative;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        canvas { height: 100%; display: block; }

        .center-marker {
            position: absolute; top: 0; left: 50%; width: 2px; height: 140px;
            background: rgba(255, 255, 255, 0.4); border-left: 1px dashed var(--neon-blue);
            pointer-events: none; z-index: 10; transform: translateX(-50%);
        }

        .info-panels { display: flex; justify-content: space-between; gap: 10px; padding: 0 20px; margin-top: 10px; }
        .panel { flex: 1; background: var(--card-bg); border-radius: 15px; padding: 12px 5px; text-align: center; }
        .panel-label { font-size: 9px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        .panel-value { font-size: 14px; font-weight: 600; text-transform: uppercase; }
        
        .swipe-hint { text-align: center; font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 5px; letter-spacing: 2px;}
    </style>
</head>
<body>

    <header>
        <h1>LAS PALMAS DE GRAN CANARIA</h1>
        <div id="date-display">CARGANDO...</div>
    </header>

    <div class="moon-section">
        <div class="moon-visual"><div class="moon-shadow" id="moon-shadow"></div></div>
        <div class="phase-title">FASE LUNAR</div>
        <div class="phase-name" id="phase-name">...</div>
        <div class="illumination" id="illumination">--%</div>
    </div>

    <div class="tide-section">
        <div class="swipe-hint">← DESLIZA LA GRÁFICA →</div>
        
        <div style="position: relative;">
            <div class="center-marker"></div>
            <div class="scroll-container" id="scroll-container">
                <canvas id="tide-canvas"></canvas>
            </div>
        </div>

        <div class="info-panels">
            <div class="panel"><div class="panel-label">HORA SELECC.</div><div class="panel-value" id="current-time">--:--</div></div>
            <div class="panel"><div class="panel-label">PRÓXIMA MAREA</div><div class="panel-value" id="next-tide">--:--</div></div>
            <div class="panel"><div class="panel-label">ALTURA MÁX</div><div class="panel-value" id="tide-height">--</div></div>
        </div>
    </div>

    <script>
        // === AQUÍ VA TU API KEY DE WORLDTIDES ===
        const API_KEY = "9946d5c9-2c16-435f-a7d5-72fff5c9b906"; 

        let marineData = [];
        let timeData = [];
        let extremesData = [];
        const today = new Date();
        
        const dateDisplay = document.getElementById('date-display');
        const phaseName = document.getElementById('phase-name');
        const illumination = document.getElementById('illumination');
        const moonShadow = document.getElementById('moon-shadow');
        const currentTimeEl = document.getElementById('current-time');
        const nextTideEl = document.getElementById('next-tide');
        const tideHeightEl = document.getElementById('tide-height');
        const canvas = document.getElementById('tide-canvas');
        const ctx = canvas.getContext('2d');
        const scrollContainer = document.getElementById('scroll-container');

        function formatDate(dateObj) {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            return dateObj.toLocaleDateString('es-ES', options).toUpperCase();
        }

        function calculateMoon(date) {
            const LUNAR_MONTH_MS = 2551442877; 
            const newMoon = new Date("2000-01-06T18:14:00.000Z").getTime();
            let phase = ((date.getTime() - newMoon) % LUNAR_MONTH_MS) / LUNAR_MONTH_MS;
            if (phase < 0) phase += 1;
            
            let phaseText = "";
            let illum = (0.5 * (1 - Math.cos(2 * Math.PI * phase))) * 100;
            
            if (phase < 0.03 || phase > 0.97) phaseText = "LUNA NUEVA";
            else if (phase < 0.22) phaseText = "CRECIENTE";
            else if (phase < 0.28) phaseText = "CUARTO CRECIENTE";
            else if (phase < 0.47) phaseText = "GIBOSA CRECIENTE";
            else if (phase < 0.53) phaseText = "LUNA LLENA";
            else if (phase < 0.72) phaseText = "GIBOSA MENGUANTE";
            else if (phase < 0.78) phaseText = "CUARTO MENGUANTE";
            else phaseText = "MENGUANTE";

            return { text: phaseText, illum: illum.toFixed(0), phaseValue: phase };
        }

        function drawMoon(phaseValue) {
            let offset;
            if (phaseValue <= 0.5) {
                offset = -(phaseValue * 200); 
                moonShadow.style.background = 'linear-gradient(to right, rgba(1, 4, 10, 0.98) 50%, rgba(1, 4, 10, 0.8) 80%, rgba(1, 4, 10, 0) 100%)';
            } else {
                offset = 100 - ((phaseValue - 0.5) * 200);
                moonShadow.style.background = 'linear-gradient(to left, rgba(1, 4, 10, 0.98) 50%, rgba(1, 4, 10, 0.8) 80%, rgba(1, 4, 10, 0) 100%)';
            }
            moonShadow.style.transform = `translateX(${offset}%)`;
        }

        // MOTOR REEMPLAZADO: WORLDTIDES API
        function fetchMarineData() {
            if (API_KEY === "PON_AQUI_TU_API_KEY") {
                dateDisplay.innerText = "FALTA API KEY";
                return;
            }

            const lat = 28.14; // Coordenadas de Las Canteras
            const lon = -15.43;
            // Pedimos 3 días de datos (alturas y picos extremos)
            const url = `https://www.worldtides.info/api/v3?heights&extremes&days=3&lat=${lat}&lon=${lon}&key=${API_KEY}`;
            
            fetch(url)
                .then(response => {
                    if (response.ok) return response.json();
                    throw new Error("Error de conexión");
                })
                .then(data => {
                    // Extraemos alturas (vienen cada 30 min)
                    marineData = data.heights.map(h => h.height);
                    timeData = data.heights.map(h => new Date(h.dt * 1000));
                    // Extraemos la información exacta de las horas de los picos
                    extremesData = data.extremes;
                    renderCanvas();
                    centerScrollOnNow();
                })
                .catch(error => {
                    console.error("Error conectando a WorldTides", error);
                });
        }

        const PX_PER_STEP = 20; // Píxeles por cada tramo de 30 minutos

        function renderCanvas() {
            if(!marineData.length) return;

            canvas.width = marineData.length * PX_PER_STEP;
            canvas.height = 140; 
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const minH = Math.min(...marineData); 
            const maxH = Math.max(...marineData);
            const range = (maxH - minH) || 1;

            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            
            for(let i=0; i<marineData.length - 1; i++) {
                const x0 = i * PX_PER_STEP;
                const normalizedY0 = (marineData[i] - minH) / range;
                const y0 = canvas.height - (normalizedY0 * (canvas.height - 60)) - 30; 

                const x1 = (i + 1) * PX_PER_STEP;
                const normalizedY1 = (marineData[i + 1] - minH) / range;
                const y1 = canvas.height - (normalizedY1 * (canvas.height - 60)) - 30; 
                
                const cp1x = x0 + (x1 - x0) / 2; const cp1y = y0;
                const cp2x = x0 + (x1 - x0) / 2; const cp2y = y1;
                
                if(i===0) ctx.moveTo(x0, y0);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x1, y1);
            }
            
            ctx.lineTo(canvas.width, canvas.height);
            ctx.closePath();

            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "rgba(0, 210, 255, 0.4)");
            gradient.addColorStop(1, "rgba(0, 40, 80, 0)");
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.beginPath();
            for(let i=0; i<marineData.length - 1; i++) {
                const x0 = i * PX_PER_STEP;
                const normalizedY0 = (marineData[i] - minH) / range;
                const y0 = canvas.height - (normalizedY0 * (canvas.height - 60)) - 30; 
                const x1 = (i + 1) * PX_PER_STEP;
                const normalizedY1 = (marineData[i + 1] - minH) / range;
                const y1 = canvas.height - (normalizedY1 * (canvas.height - 60)) - 30; 
                const cp1x = x0 + (x1 - x0) / 2; const cp1y = y0;
                const cp2x = x0 + (x1 - x0) / 2; const cp2y = y1;
                if(i===0) ctx.moveTo(x0, y0);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x1, y1);
            }
            ctx.strokeStyle = "#00d2ff";
            ctx.lineWidth = 3;
            ctx.shadowColor = "#00d2ff"; ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0; 
            
            ctx.fillStyle = "white"; ctx.font = "10px -apple-system, sans-serif"; ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Imprimir extremos exactos provenientes de la API
            const startTime = timeData[0].getTime();
            const stepMs = timeData[1].getTime() - startTime;

            extremesData.forEach(ext => {
                const extTime = ext.dt * 1000;
                const index = (extTime - startTime) / stepMs;
                const x = index * PX_PER_STEP;
                
                const normalizedY = (ext.height - minH) / range;
                const y = canvas.height - (normalizedY * (canvas.height - 60)) - 30; 

                const timeStr = new Date(extTime).toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
                
                if (ext.type === "High") {
                    ctx.fillText(`PLEAMAR (${timeStr})`, x, y - 20); 
                    ctx.fillText("+" + ext.height.toFixed(1) + "M", x, y - 5);
                } else {
                    ctx.fillText(`BAJAMAR (${timeStr})`, x, y + 20); 
                    ctx.fillText("+" + ext.height.toFixed(1) + "M", x, y + 30);
                }
            });
        }

        function updateUIViaScroll() {
            if(!timeData.length) return;
            const centerScrollX = scrollContainer.scrollLeft + (scrollContainer.clientWidth / 2);
            let hoverIndex = Math.floor(centerScrollX / PX_PER_STEP);
            if (hoverIndex < 0) hoverIndex = 0; if (hoverIndex >= timeData.length) hoverIndex = timeData.length - 1;
            const hoverDate = timeData[hoverIndex];
            
            dateDisplay.innerText = formatDate(hoverDate);
            const moon = calculateMoon(hoverDate);
            phaseName.innerText = moon.text; illumination.innerText = moon.illum + "%";
            drawMoon(moon.phaseValue);
            
            const timeStr = hoverDate.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();
            currentTimeEl.innerText = timeStr;
            tideHeightEl.innerText = "+" + Math.max(...marineData).toFixed(1) + " M";
            
            let foundNext = false;
            for (let j = 0; j < extremesData.length; j++) {
                if (extremesData[j].dt * 1000 > hoverDate.getTime()) {
                    const ext = extremesData[j];
                    const extTimeStr = new Date(ext.dt * 1000).toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();
                    const typeName = ext.type === "High" ? "PLEAMAR" : "BAJAMAR";
                    nextTideEl.innerText = `${typeName} (${extTimeStr})`;
                    foundNext = true;
                    break;
                }
            }
            if(!foundNext) nextTideEl.innerText = "--:--";
        }

        function centerScrollOnNow() {
            const now = new Date(); let closestIndex = 0; let minDiff = Infinity;
            for(let i=0; i<timeData.length; i++) {
                const diff = Math.abs(now - timeData[i]);
                if(diff < minDiff) { minDiff = diff; closestIndex = i; }
            }
            const targetX = (closestIndex * PX_PER_STEP) - (scrollContainer.clientWidth / 2);
            scrollContainer.scrollLeft = targetX;
            updateUIViaScroll();
        }

        scrollContainer.addEventListener('scroll', () => { requestAnimationFrame(updateUIViaScroll); });
        fetchMarineData();
    </script>
</body>
</html>
