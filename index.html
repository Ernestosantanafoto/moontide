<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina - Luna y Marea</title>
    <style>
        :root {
            --bg-color: #040b16;
            --text-main: #ffffff;
            --text-muted: #8ab4f8;
            --neon-blue: #00d2ff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #0d2240 0%, #040b16 70%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header { text-align: center; padding: 20px 10px 10px; z-index: 10; }
        h1 { font-size: 14px; font-weight: 600; letter-spacing: 1px; color: var(--text-main); }
        #date-display { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-top: 5px; letter-spacing: 0.5px; }

        /* Luna Fotorrealista */
        .moon-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 10px; }
        .moon-visual {
            width: 180px; height: 180px; border-radius: 50%;
            /* Usamos una textura realista de mapa lunar de la NASA/dominio público */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), inset -20px -20px 40px rgba(0,0,0,0.8);
            position: relative; margin-bottom: 20px; overflow: hidden;
        }

        /* Sombra negra que simula la fase lunar */
        .moon-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); border-radius: 50%;
            transform: translateX(100%);
            transition: transform 0.1s linear;
        }

        .phase-title { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
        .phase-name { font-size: 20px; font-weight: 600; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .illumination { font-size: 16px; font-weight: 300; }

        /* Sección de Marea Deslizante */
        .tide-section {
            flex: 1; background: rgba(0, 40, 80, 0.2); border-top-left-radius: 30px; border-top-right-radius: 30px;
            backdrop-filter: blur(10px); padding: 20px 0; position: relative; display: flex; flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .tide-header { text-align: center; margin-bottom: 10px; }
        
        /* Contenedor con scroll nativo fluido */
        .scroll-container {
            width: 100%; height: 140px; overflow-x: auto; overflow-y: hidden; 
            scroll-behavior: auto; -webkit-overflow-scrolling: touch;
            /* Ocultar barra de scroll */
            scrollbar-width: none; 
            position: relative;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        /* El lienzo es mucho más ancho que la pantalla para alojar 7 días */
        canvas { height: 100%; display: block; }

        /* Línea indicadora central (el "ahora" o el punto que miramos) */
        .center-marker {
            position: absolute; top: 0; left: 50%; width: 2px; height: 140px;
            background: rgba(255, 255, 255, 0.4); border-left: 1px dashed var(--neon-blue);
            pointer-events: none; z-index: 10; transform: translateX(-50%);
        }

        .info-panels { display: flex; justify-content: space-between; gap: 10px; padding: 0 20px; margin-top: 10px; }
        .panel { flex: 1; background: var(--card-bg); border-radius: 15px; padding: 12px 5px; text-align: center; }
        .panel-label { font-size: 9px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        .panel-value { font-size: 14px; font-weight: 600; text-transform: uppercase; }
        
        .swipe-hint { text-align: center; font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 5px; letter-spacing: 2px;}
    </style>
</head>
<body>

    <header>
        <h1>LAS PALMAS DE GRAN CANARIA</h1>
        <div id="date-display">CARGANDO...</div>
    </header>

    <div class="moon-section">
        <div class="moon-visual"><div class="moon-shadow" id="moon-shadow"></div></div>
        <div class="phase-title">FASE LUNAR</div>
        <div class="phase-name" id="phase-name">...</div>
        <div class="illumination" id="illumination">--%</div>
    </div>

    <div class="tide-section">
        <div class="swipe-hint">← DESLIZA LA GRÁFICA →</div>
        
        <div style="position: relative;">
            <div class="center-marker"></div>
            <div class="scroll-container" id="scroll-container">
                <canvas id="tide-canvas"></canvas>
            </div>
        </div>

        <div class="info-panels">
            <div class="panel"><div class="panel-label">HORA SELECC.</div><div class="panel-value" id="current-time">--:--</div></div>
            <div class="panel"><div class="panel-label">SIGUIENTE EVENTO</div><div class="panel-value" id="next-tide">--:--</div></div>
            <div class="panel"><div class="panel-label">ESTADO</div><div class="panel-value" id="tide-state" style="color: var(--neon-blue);">--</div></div>
        </div>
    </div>

    <script>
        let marineData = [];
        let timeData = [];
        const today = new Date();
        
        // Elementos DOM
        const dateDisplay = document.getElementById('date-display');
        const phaseName = document.getElementById('phase-name');
        const illumination = document.getElementById('illumination');
        const moonShadow = document.getElementById('moon-shadow');
        const tideState = document.getElementById('tide-state');
        const currentTimeEl = document.getElementById('current-time');
        const nextTideEl = document.getElementById('next-tide');
        const canvas = document.getElementById('tide-canvas');
        const ctx = canvas.getContext('2d');
        const scrollContainer = document.getElementById('scroll-container');

        // Formatear fechas en MAYÚSCULAS
        function formatDate(dateObj) {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            return dateObj.toLocaleDateString('es-ES', options).toUpperCase();
        }

        // --- CÁLCULO LUNAR ---
        function calculateMoon(date) {
            const LUNAR_MONTH_MS = 2551442877; 
            const newMoon = new Date("2000-01-06T18:14:00.000Z").getTime();
            let phase = ((date.getTime() - newMoon) % LUNAR_MONTH_MS) / LUNAR_MONTH_MS;
            if (phase < 0) phase += 1;
            
            let phaseText = "";
            let illum = (0.5 * (1 - Math.cos(2 * Math.PI * phase))) * 100;
            
            if (phase < 0.03 || phase > 0.97) phaseText = "LUNA NUEVA";
            else if (phase < 0.22) phaseText = "CRECIENTE";
            else if (phase < 0.28) phaseText = "CUARTO CRECIENTE";
            else if (phase < 0.47) phaseText = "GIBOSA CRECIENTE";
            else if (phase < 0.53) phaseText = "LUNA LLENA";
            else if (phase < 0.72) phaseText = "GIBOSA MENGUANTE";
            else if (phase < 0.78) phaseText = "CUARTO MENGUANTE";
            else phaseText = "MENGUANTE";

            return { text: phaseText, illum: illum.toFixed(0), phaseValue: phase };
        }

        // Dibujar sombra sobre la luna realista
        function drawMoon(phaseValue) {
            // Un truco matemático simple para desplazar la sombra negra y simular la fase
            let offset = (phaseValue * 200) - 100; 
            // Invertimos la sombra en la segunda mitad del ciclo
            if(phaseValue > 0.5) offset = (phaseValue * 200) - 300; 
            moonShadow.style.transform = `translateX(${offset}%)`;
        }

        // --- FETCH DATOS ---
        async function fetchMarineData() {
            const lat = 28.12; const lon = -15.43;
            const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=sea_level_height_msl&timezone=auto&past_days=1`;
            
            try {
                const response = await fetch(url);
                if(response.ok) {
                    const data = await response.json();
                    marineData = data.hourly.sea_level_height_msl;
                    timeData = data.hourly.time.map(t => new Date(t));
                    renderCanvas();
                    // Centrar el scroll en la hora actual
                    centerScrollOnNow();
                }
            } catch (error) {
                console.error("Error conectando a la API de mareas");
            }
        }

        // --- RENDERIZADO DEL GRÁFICO ---
        const PX_PER_HOUR = 30; // Píxeles de ancho por cada hora

        function renderCanvas() {
            if(!marineData.length) return;

            // Ajustar el ancho del canvas para que quepan todos los datos en línea
            canvas.width = marineData.length * PX_PER_HOUR;
            canvas.height = 140; 
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ignorar nulos
            const validData = marineData.filter(v => v !== null);
            const minH = Math.min(...validData); 
            const maxH = Math.max(...validData);
            const range = (maxH - minH) || 1;

            // Trazar línea
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            
            for(let i=0; i<marineData.length; i++) {
                if(marineData[i] === null) continue;
                const x = i * PX_PER_HOUR;
                const normalizedY = (marineData[i] - minH) / range;
                const y = canvas.height - (normalizedY * (canvas.height - 60)) - 30; 
                ctx.lineTo(x, y);
            }
            
            ctx.lineTo(canvas.width, canvas.height);
            ctx.closePath();

            // Relleno Neón
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "rgba(0, 210, 255, 0.4)");
            gradient.addColorStop(1, "rgba(0, 40, 80, 0)");
            ctx.fillStyle = gradient;
            ctx.fill();

            // Borde brillante
            ctx.beginPath();
            for(let i=0; i<marineData.length; i++) {
                if(marineData[i] === null) continue;
                const x = i * PX_PER_HOUR;
                const normalizedY = (marineData[i] - minH) / range;
                const y = canvas.height - (normalizedY * (canvas.height - 60)) - 30; 
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = "#00d2ff";
            ctx.lineWidth = 3;
            // Efecto Glow
            ctx.shadowColor = "#00d2ff";
            ctx.shadowBlur = 10;
            ctx.stroke();
            
            // Limpiar sombra para los textos
            ctx.shadowBlur = 0; 
            
            // Dibujar marcadores de PLEAMAR y BAJAMAR
            ctx.fillStyle = "white";
            ctx.font = "10px -apple-system, sans-serif";
            ctx.textAlign = "center";

            for(let i=1; i<marineData.length - 1; i++) {
                if(!marineData[i]) continue;
                const prev = marineData[i-1];
                const curr = marineData[i];
                const next = marineData[i+1];
                
                const x = i * PX_PER_HOUR;
                const normalizedY = (curr - minH) / range;
                const y = canvas.height - (normalizedY * (canvas.height - 60)) - 30; 

                // Es Pleamar (Pico)
                if(curr > prev && curr > next) {
                    ctx.fillText("PLEAMAR", x, y - 15);
                    ctx.fillText("+" + curr.toFixed(1) + "M", x, y - 5);
                }
                // Es Bajamar (Valle)
                else if (curr < prev && curr < next) {
                    ctx.fillText("BAJAMAR", x, y + 15);
                    ctx.fillText(curr.toFixed(1) + "M", x, y + 25);
                }
            }
        }

        // --- LÓGICA DE SINCRONIZACIÓN AL HACER SCROLL ---
        function updateUIViaScroll() {
            if(!timeData.length) return;

            // Encontrar la hora exacta que cruza la mitad de la pantalla
            const centerScrollX = scrollContainer.scrollLeft + (scrollContainer.clientWidth / 2);
            let hoverIndex = Math.floor(centerScrollX / PX_PER_HOUR);
            
            // Prevenir salidas de rango
            if (hoverIndex < 0) hoverIndex = 0;
            if (hoverIndex >= timeData.length) hoverIndex = timeData.length - 1;

            const hoverDate = timeData[hoverIndex];
            
            // 1. Actualizar Fecha Superior (MAYÚSCULAS)
            dateDisplay.innerText = formatDate(hoverDate);

            // 2. Actualizar Luna según el día que miramos
            const moon = calculateMoon(hoverDate);
            phaseName.innerText = moon.text;
            illumination.innerText = moon.illum + "%";
            drawMoon(moon.phaseValue);

            // 3. Paneles Inferiores
            // Hora enfocada
            const timeStr = hoverDate.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();
            currentTimeEl.innerText = timeStr;

            // Estado Actual (Subiendo o Bajando)
            let currVal = marineData[hoverIndex];
            let nextVal = marineData[hoverIndex + 1] || currVal;
            tideState.innerText = (nextVal > currVal) ? "SUBIENDO" : "BAJANDO";

            // Buscar siguiente Pleamar o Bajamar desde la hora enfocada
            let foundNext = false;
            for(let j = hoverIndex + 1; j < marineData.length - 1; j++) {
                const prev = marineData[j-1];
                const curr = marineData[j];
                const next = marineData[j+1];
                
                if (curr > prev && curr > next) {
                    const eventTime = timeData[j].toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();
                    nextTideEl.innerText = `PLEAMAR (${eventTime})`;
                    foundNext = true;
                    break;
                } else if (curr < prev && curr < next) {
                    const eventTime = timeData[j].toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();
                    nextTideEl.innerText = `BAJAMAR (${eventTime})`;
                    foundNext = true;
                    break;
                }
            }
            if(!foundNext) nextTideEl.innerText = "--:--";
        }

        function centerScrollOnNow() {
            // Buscamos el índice más cercano a "ahora"
            const now = new Date();
            let closestIndex = 0;
            let minDiff = Infinity;
            
            for(let i=0; i<timeData.length; i++) {
                const diff = Math.abs(now - timeData[i]);
                if(diff < minDiff) {
                    minDiff = diff;
                    closestIndex = i;
                }
            }
            
            // Desplazar el scroll para que esa hora quede en el centro de la pantalla
            const targetX = (closestIndex * PX_PER_HOUR) - (scrollContainer.clientWidth / 2);
            scrollContainer.scrollLeft = targetX;
            updateUIViaScroll();
        }

        // Escuchar el evento scroll nativo para actualizar en tiempo real
        scrollContainer.addEventListener('scroll', () => {
            requestAnimationFrame(updateUIViaScroll);
        });

        // Inicializar
        fetchMarineData();
    </script>
</body>
</html>
