<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina - Luna y Marea</title>
    <style>
        :root {
            --bg-color: #01040a;
            --text-main: #ffffff;
            --text-muted: #8ab4f8;
            --neon-blue: #00e5ff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Fondo estrellado en toda la app */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Night_Sky_with_Clouds.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Degradado para oscurecer la parte inferior y simular el mar */
        .ocean-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(1, 4, 10, 0) 0%, rgba(1, 4, 10, 0.9) 30%, rgba(4, 15, 35, 1) 100%);
            z-index: 0; pointer-events: none;
        }

        header { text-align: center; padding: 25px 10px 10px; z-index: 10; position: relative; }
        h1 { font-size: 14px; font-weight: 600; letter-spacing: 1.5px; color: var(--text-main); text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        #date-display { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        #btn-now {
            position: absolute;
            top: 25px;
            right: 15px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            transition: all 0.2s;
            z-index: 100;
        }
        #btn-now:active { background: rgba(0, 229, 255, 0.3); transform: scale(0.95); }

        .moon-section {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 20px; z-index: 10;
        }
        
        .moon-visual {
            /* Luna más grande */
            width: 240px; height: 240px; border-radius: 50%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
            background-size: cover; background-position: center;
            /* Resplandor sutil sin borde negro */
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
            position: relative; margin-bottom: 25px; overflow: hidden;
        }

        .moon-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            transition: transform 0.1s linear, background 0.1s linear;
        }

        .phase-title { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .phase-name { font-size: 22px; font-weight: 600; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .illumination { font-size: 16px; font-weight: 300; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .tide-section {
            height: 300px; background: transparent; position: relative; display: flex; flex-direction: column; z-index: 10;
        }

        .scroll-container {
            width: 100%; height: 180px; overflow-x: auto; overflow-y: hidden; 
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; position: relative;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        canvas { height: 100%; display: block; }

        .center-marker {
            position: absolute; top: 0; left: 50%; width: 2px; height: 180px;
            background: linear-gradient(to bottom, transparent, var(--neon-blue) 70%, transparent);
            pointer-events: none; z-index: 10; transform: translateX(-50%);
        }

        .info-panels { display: flex; justify-content: space-between; gap: 10px; padding: 0 20px; margin-top: 15px; }
        .panel { 
            flex: 1; background: rgba(10, 20, 40, 0.6); border-radius: 15px; padding: 15px 5px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px);
        }
        .panel-label { font-size: 9px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        .panel-value { font-size: 15px; font-weight: 600; text-transform: uppercase; }
        
        .swipe-hint { text-align: center; font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 5px; letter-spacing: 2px; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="ocean-overlay"></div>

    <header>
        <h1>LAS PALMAS DE GRAN CANARIA</h1>
        <div id="date-display">CARGANDO...</div>
        <button id="btn-now">VOLVER AHORA</button>
    </header>

    <div class="moon-section">
        <div class="moon-visual"><div class="moon-shadow" id="moon-shadow"></div></div>
        <div class="phase-title">FASE LUNAR</div>
        <div class="phase-name" id="phase-name">...</div>
        <div class="illumination" id="illumination">--%</div>
    </div>

    <div class="tide-section">
        <div class="swipe-hint">← DESLIZA LA GRÁFICA →</div>
        
        <div style="position: relative;">
            <div class="center-marker"></div>
            <div class="scroll-container" id="scroll-container">
                <canvas id="tide-canvas"></canvas>
            </div>
        </div>

        <div class="info-panels">
            <div class="panel"><div class="panel-label">HORA SELECC.</div><div class="panel-value" id="current-time">--:--</div></div>
            <div class="panel"><div class="panel-label">PRÓXIMA MAREA</div><div class="panel-value" id="next-tide">--:--</div></div>
            <div class="panel"><div class="panel-label">ALTURA MÁX</div><div class="panel-value" id="tide-height">--</div></div>
        </div>
    </div>

    <script>
        const API_KEY = "9946d5c9-2c16-435f-a7d5-72fff5c9b906"; 

        let marineData = [];
        let timeData = [];
        let extremesData = [];
        
        const dateDisplay = document.getElementById('date-display');
        const phaseName = document.getElementById('phase-name');
        const illumination = document.getElementById('illumination');
        const moonShadow = document.getElementById('moon-shadow');
        const currentTimeEl = document.getElementById('current-time');
        const nextTideEl = document.getElementById('next-tide');
        const tideHeightEl = document.getElementById('tide-height');
        const canvas = document.getElementById('tide-canvas');
        const ctx = canvas.getContext('2d');
        const scrollContainer = document.getElementById('scroll-container');
        const btnNow = document.getElementById('btn-now');

        function formatDate(dateObj) {
            return dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
        }

        function formatDateShort(dateObj) {
            return dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric' }).toUpperCase();
        }

        function calculateMoon(date) {
            const LUNAR_MONTH_MS = 2551442877; // 29.53 días
            const newMoon = new Date("2000-01-06T18:14:00.000Z").getTime();
            let phase = ((date.getTime() - newMoon) % LUNAR_MONTH_MS) / LUNAR_MONTH_MS;
            if (phase < 0) phase += 1;
            
            let phaseText = "";
            let illum = (0.5 * (1 - Math.cos(2 * Math.PI * phase))) * 100;
            
            if (phase < 0.03 || phase > 0.97) phaseText = "LUNA NUEVA";
            else if (phase < 0.22) phaseText = "CRECIENTE";
            else if (phase < 0.28) phaseText = "CUARTO CRECIENTE";
            else if (phase < 0.47) phaseText = "GIBOSA CRECIENTE";
            else if (phase < 0.53) phaseText = "LUNA LLENA";
            else if (phase < 0.72) phaseText = "GIBOSA MENGUANTE";
            else if (phase < 0.78) phaseText = "CUARTO MENGUANTE";
            else phaseText = "MENGUANTE";

            return { text: phaseText, illum: illum.toFixed(0), phaseValue: phase };
        }

        function drawMoon(phaseValue) {
            let offset;
            // Usamos colores muy oscuros que coincidan con tu fondo estelar para ocultar el "halo"
            const darkSkyColor = 'rgba(1, 4, 10, 0.95)';
            const fadeSkyColor = 'rgba(1, 4, 10, 0.6)';
            
            if (phaseValue <= 0.5) {
                // Creciente
                offset = -(phaseValue * 200); 
                moonShadow.style.background = `linear-gradient(to right, ${darkSkyColor} 45%, ${fadeSkyColor} 55%, transparent 65%)`;
            } else {
                // Menguante
                offset = 100 - ((phaseValue - 0.5) * 200);
                moonShadow.style.background = `linear-gradient(to left, ${darkSkyColor} 45%, ${fadeSkyColor} 55%, transparent 65%)`;
            }
            moonShadow.style.transform = `translateX(${offset}%)`;
        }

        function fetchMarineData() {
            // Solicitamos 7 días para poder visualizar un avance real en el ciclo lunar (aprox 25% del ciclo)
            const url = `https://www.worldtides.info/api/v3?heights&extremes&days=7&lat=28.14&lon=-15.43&key=${API_KEY}`;
            
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    marineData = data.heights.map(h => h.height);
                    timeData = data.heights.map(h => new Date(h.dt * 1000));
                    extremesData = data.extremes;
                    renderCanvas();
                    centerScrollOnNow();
                })
                .catch(e => console.error("Error API:", e));
        }

        const PX_PER_STEP = 30; // 30px cada 30 min = onda ancha y suave

        function getCanvasY(height, minH, range) {
            return canvas.height - (((height - minH) / range) * 80) - 50;
        }

        function renderCanvas() {
            canvas.width = marineData.length * PX_PER_STEP; 
            canvas.height = 180; 
            
            const minH = Math.min(...marineData); 
            const maxH = Math.max(...marineData);
            const range = (maxH - minH) || 1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- SEPARACIÓN DÍA POR DÍA ---
            let currentDay = timeData[0].getDate();
            let shade = false;
            let lastX = 0;

            for (let i = 0; i < timeData.length; i++) {
                if (timeData[i].getDate() !== currentDay || i === timeData.length - 1) {
                    let x = i * PX_PER_STEP;
                    
                    if (shade) {
                        ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
                        ctx.fillRect(lastX, 0, x - lastX, canvas.height);
                    }
                    
                    ctx.beginPath();
                    ctx.moveTo(x, 0); 
                    ctx.lineTo(x, canvas.height);
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    currentDay = timeData[i].getDate();
                    shade = !shade;
                    lastX = x;
                }
            }

            // --- ONDA DE MAREA PERFECTA (Bézier cúbico) ---
            ctx.beginPath();
            ctx.moveTo(0, canvas.height); 
            ctx.lineTo(0, getCanvasY(marineData[0], minH, range));
            
            for(let i = 0; i < marineData.length - 1; i++) {
                const x0 = i * PX_PER_STEP; 
                const y0 = getCanvasY(marineData[i], minH, range);
                const x1 = (i + 1) * PX_PER_STEP; 
                const y1 = getCanvasY(marineData[i+1], minH, range);
                
                // Puntos de control para la curva Bézier cúbica suave
                const xc = (x0 + x1) / 2;
                ctx.bezierCurveTo(xc, y0, xc, y1, x1, y1);
            }
            
            ctx.lineTo((marineData.length - 1) * PX_PER_STEP, canvas.height); 
            ctx.closePath();
            
            let gradient = ctx.createLinearGradient(0, 0, 0, 180);
            gradient.addColorStop(0, "rgba(0, 210, 255, 0.4)"); 
            gradient.addColorStop(1, "rgba(0, 40, 80, 0)");
            ctx.fillStyle = gradient; 
            ctx.fill();

            // Dibujar la línea de neón
            ctx.beginPath();
            ctx.moveTo(0, getCanvasY(marineData[0], minH, range));
            for(let i = 0; i < marineData.length - 1; i++) {
                const x0 = i * PX_PER_STEP; 
                const y0 = getCanvasY(marineData[i], minH, range);
                const x1 = (i + 1) * PX_PER_STEP; 
                const y1 = getCanvasY(marineData[i+1], minH, range);
                const xc = (x0 + x1) / 2;
                ctx.bezierCurveTo(xc, y0, xc, y1, x1, y1);
            }
            ctx.strokeStyle = "#00d2ff"; 
            ctx.lineWidth = 3; 
            ctx.shadowColor = "#00d2ff";
            ctx.shadowBlur = 12;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // --- LÍNEA DE TIEMPO INFERIOR ---
            ctx.textAlign = "center";
            for (let i = 0; i < timeData.length; i++) {
                const date = timeData[i];
                const x = i * PX_PER_STEP;

                if (date.getMinutes() === 0 && date.getHours() % 6 === 0) {
                    ctx.fillStyle = "rgba(255,255,255,0.4)";
                    ctx.font = "9px -apple-system, sans-serif";
                    ctx.fillText(date.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase(), x, canvas.height - 10);
                    ctx.fillRect(x - 0.5, canvas.height - 25, 1, 4);
                }

                if (date.getHours() === 12 && date.getMinutes() === 0) {
                    ctx.fillStyle = "rgba(255,255,255,0.8)";
                    ctx.font = "bold 11px -apple-system, sans-serif";
                    ctx.fillText(formatDateShort(date), x, canvas.height - 35);
                }
            }
        }

        function updateUIViaScroll() {
            if(!timeData.length) return;
            const centerScrollX = scrollContainer.scrollLeft + (scrollContainer.clientWidth / 2);
            let hoverIndex = Math.floor(centerScrollX / PX_PER_STEP);
            if (hoverIndex < 0) hoverIndex = 0; 
            if (hoverIndex >= timeData.length) hoverIndex = timeData.length - 1;
            
            const hoverDate = timeData[hoverIndex] || new Date();
            
            dateDisplay.innerText = formatDate(hoverDate);
            
            // LA LUNA SE ACTUALIZA AQUÍ CALCULANDO EL PORCENTAJE DE SU CICLO PARA CADA DÍA
            const moon = calculateMoon(hoverDate);
            phaseName.innerText = moon.text; 
            illumination.innerText = moon.illum + "%";
            drawMoon(moon.phaseValue);
            
            currentTimeEl.innerText = hoverDate.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();
            tideHeightEl.innerText = "+" + Math.max(...marineData).toFixed(1) + " M";
            
            let found = extremesData.find(e => e.dt * 1000 > hoverDate.getTime());
            nextTideEl.innerText = found ? `${found.type === "High" ? "PLEAMAR" : "BAJAMAR"} (${new Date(found.dt*1000).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}).toUpperCase()})` : "--:--";
        }

        function centerScrollOnNow() {
            if (!timeData.length) return;
            const now = new Date();
            let closestIndex = 0; 
            let minDiff = Infinity;
            for(let i = 0; i < timeData.length; i++) {
                const diff = Math.abs(now - timeData[i]);
                if(diff < minDiff) { 
                    minDiff = diff; 
                    closestIndex = i; 
                }
            }
            scrollContainer.scrollLeft = (closestIndex * PX_PER_STEP) - (scrollContainer.clientWidth / 2);
            updateUIViaScroll();
        }

        scrollContainer.addEventListener('scroll', () => requestAnimationFrame(updateUIViaScroll));
        btnNow.addEventListener('click', centerScrollOnNow);
        
        fetchMarineData();
    </script>
</body>
</html>
