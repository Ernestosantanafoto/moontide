// ── SUAVIZADO DE DATOS ────────────────────────────────────────────
// Media móvil gaussiana para eliminar ruido de alta frecuencia
// manteniendo la forma real de la marea
function smoothData(data, passes=3) {
  let d = [...data];
  for (let p = 0; p < passes; p++) {
    const s = [...d];
    for (let i = 1; i < d.length - 1; i++) {
      d[i] = s[i-1] * 0.25 + s[i] * 0.5 + s[i+1] * 0.25;
    }
  }
  return d;
}

// ── DEMO DATA ─────────────────────────────────────────────────────
function generateDemoData() {
  const now=new Date(); now.setMinutes(0,0,0);
  const heights=[],times=[],extremes=[];
  for(let i=0;i<336;i++){
    const t=new Date(now.getTime()+i*30*60*1000);
    heights.push(0.6+0.3*Math.sin(i*Math.PI/12+0.5)+0.15*Math.sin(i*Math.PI/12.4));
    times.push(t);
  }
  for(let i=1;i<heights.length-1;i++){
    if(heights[i]>heights[i-1]&&heights[i]>heights[i+1]&&heights[i]>0.75)
      extremes.push({dt:times[i].getTime()/1000,type:"High",height:heights[i]});
    if(heights[i]<heights[i-1]&&heights[i]<heights[i+1]&&heights[i]<0.45)
      extremes.push({dt:times[i].getTime()/1000,type:"Low",height:heights[i]});
  }
  return {heights,times,extremes};
}

const BLUR_SOFT=22,BLUR_MID=12,BLUR_HARD=3,FADE_ZONE=0.08;

function moonCalc(date){
  const LUNATION=2551442877;
  const ref=new Date("2000-01-06T18:14:00Z").getTime();
  let p=((date.getTime()-ref)%LUNATION)/LUNATION;
  if(p<0)p+=1;
  const illum=(0.5*(1-Math.cos(2*Math.PI*p))*100).toFixed(0);
  let txt="";
  if(p<0.03||p>0.97)     txt="Luna nueva";
  else if(p<0.22)         txt="Creciente";
  else if(p<0.28)         txt="Cuarto creciente";
  else if(p<0.47)         txt="Gibosa creciente";
  else if(p<0.53)         txt="Luna llena";
  else if(p<0.72)         txt="Gibosa menguante";
  else if(p<0.78)         txt="Cuarto menguante";
  else                    txt="Menguante";
  return {txt,illum,p};
}

function shadowOpacity(phase){
  return 0.65+0.5*(1-Math.cos(2*Math.PI*phase))*0.32;
}
function traceShadow(ctx,tX,darkOnRight,r,cx,cy){
  const absX=Math.abs(tX);
  ctx.beginPath();
  if(absX>=r-0.5){ctx.arc(cx,cy,r,0,Math.PI*2);}
  else if(!darkOnRight){
    ctx.arc(cx,cy,r,Math.PI/2,3*Math.PI/2,false);
    ctx.ellipse(cx,cy,absX,r,0,3*Math.PI/2,Math.PI/2,tX<0);
  }else{
    ctx.arc(cx,cy,r,-Math.PI/2,Math.PI/2,false);
    ctx.ellipse(cx,cy,absX,r,0,Math.PI/2,-Math.PI/2,tX>=0);
  }
  ctx.closePath();
}
function drawMoon(phase){
  const cv=document.getElementById('moon-canvas');
  const size=cv.offsetWidth*(window.devicePixelRatio||1);
  if(cv.width!==size){cv.width=size;cv.height=size;}
  const ctx=cv.getContext('2d'),r=size/2;
  ctx.clearRect(0,0,size,size);
  ctx.save();ctx.beginPath();ctx.arc(r,r,r,0,Math.PI*2);ctx.clip();
  ctx.drawImage(lunaImg,MOON_SRC_X,MOON_SRC_Y,MOON_SRC_W,MOON_SRC_H,0,0,size,size);
  ctx.restore();
  ctx.save();
  const vig=ctx.createRadialGradient(r,r,r*0.80,r,r,r);
  vig.addColorStop(0,'rgba(3,13,26,0)');vig.addColorStop(0.90,'rgba(3,13,26,0)');
  vig.addColorStop(0.97,'rgba(3,13,26,0.75)');vig.addColorStop(1.0,'rgba(3,13,26,1)');
  ctx.beginPath();ctx.arc(r,r,r,0,Math.PI*2);ctx.fillStyle=vig;ctx.fill();ctx.restore();
  let termX,darkOnRight;
  if(phase<=0.5){termX=r*(1-(phase/0.5)*2);darkOnRight=false;}
  else{termX=r*(1-((phase-0.5)/0.5)*2);darkOnRight=true;}
  const opacity=shadowOpacity(phase);
  const dist=Math.min(phase,1-phase);
  const blurScale=dist<FADE_ZONE?(dist/FADE_ZONE)*(dist/FADE_ZONE):1;
  function renderLayer(blurBase,alpha,shrink){
    const blurPx=Math.max(0.5,blurBase*blurScale);
    const tX=termX>=0?Math.max(0,termX-shrink):Math.min(0,termX+shrink);
    const off=document.createElement('canvas');off.width=size;off.height=size;
    const oc=off.getContext('2d');
    traceShadow(oc,tX,darkOnRight,r,r,r);
    oc.fillStyle=`rgba(2,10,28,${opacity})`;oc.fill();
    ctx.save();ctx.filter=`blur(${blurPx}px)`;ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.arc(r,r,r+blurPx,0,Math.PI*2);ctx.clip();
    ctx.drawImage(off,0,0);ctx.restore();
  }
  renderLayer(BLUR_SOFT,0.45,0);renderLayer(BLUR_MID,0.60,BLUR_MID*0.3);renderLayer(BLUR_HARD,0.95,BLUR_MID*0.8);
  ctx.save();ctx.globalCompositeOperation='destination-in';
  ctx.beginPath();ctx.arc(r,r,r,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.restore();
}

function updateMoonTimes(date){
  if(typeof SunCalc==='undefined')return;
  const dayRef=new Date(date);dayRef.setHours(12,0,0,0);
  const mt=SunCalc.getMoonTimes(dayRef,LAT,LON);
  document.getElementById('moonrise-time').innerText=mt.rise?fmtTime(mt.rise):'--:--';
  document.getElementById('moonset-time').innerText=mt.set?fmtTime(mt.set):'--:--';
}

function fmt(d){return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();}
function fmtShort(d){return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric'}).toUpperCase();}
function fmtTime(d){return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}).toUpperCase();}

// ── MAREA ─────────────────────────────────────────────────────────
function cY(h,minH,range,H){return H-(((h-minH)/range)*125)-14;}

function renderTide(){
  const cv=document.getElementById('tide-canvas');
  const ctx=cv.getContext('2d');
  cv.width=marineData.length*PX;const H=160;cv.height=H;
  const minH=Math.min(...marineData),maxH=Math.max(...marineData);
  const range=(maxH-minH)||1;

  // Datos suavizados para el dibujo (no afecta a los valores reales)
  const sd=smoothData(marineData,3);

  ctx.clearRect(0,0,cv.width,H);

  // Bandas días
  let curDay=timeData[0].getDate(),shade=false,lastX=0;
  for(let i=0;i<timeData.length;i++){
    if(timeData[i].getDate()!==curDay||i===timeData.length-1){
      const x=i*PX;
      if(shade){ctx.fillStyle="rgba(255,255,255,0.018)";ctx.fillRect(lastX,0,x-lastX,H);}
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);
      ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;ctx.stroke();
      curDay=timeData[i].getDate();shade=!shade;lastX=x;
    }
  }

  // ── RELLENO con Catmull-Rom suavizado ──
  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(0,cY(sd[0],minH,range,H));
  for(let i=0;i<sd.length-1;i++){
    const x0=i*PX,     y0=cY(sd[i],  minH,range,H);
    const x1=(i+1)*PX, y1=cY(sd[i+1],minH,range,H);
    // Catmull-Rom → Bezier: usa puntos vecinos para tangentes suaves
    const ym1 = cY(sd[Math.max(0,i-1)],  minH,range,H);
    const y2  = cY(sd[Math.min(sd.length-1,i+2)],minH,range,H);
    const cp1x=x0+PX/3, cp1y=y0+(y1-ym1)/6;
    const cp2x=x1-PX/3, cp2y=y1-(y2-y0)/6;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x1,y1);
  }
  ctx.lineTo((sd.length-1)*PX,H);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"rgba(0,195,255,0.4)");g.addColorStop(0.45,"rgba(0,90,170,0.22)");g.addColorStop(1,"rgba(0,20,60,0.03)");
  ctx.fillStyle=g;ctx.fill();

  // ── LÍNEA NEÓN con Catmull-Rom ──
  ctx.beginPath();
  ctx.moveTo(0,cY(sd[0],minH,range,H));
  for(let i=0;i<sd.length-1;i++){
    const x0=i*PX,     y0=cY(sd[i],  minH,range,H);
    const x1=(i+1)*PX, y1=cY(sd[i+1],minH,range,H);
    const ym1=cY(sd[Math.max(0,i-1)],  minH,range,H);
    const y2 =cY(sd[Math.min(sd.length-1,i+2)],minH,range,H);
    const cp1x=x0+PX/3, cp1y=y0+(y1-ym1)/6;
    const cp2x=x1-PX/3, cp2y=y1-(y2-y0)/6;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x1,y1);
  }
  ctx.strokeStyle="#00d2ff";ctx.lineWidth=2.5;
  ctx.shadowColor="#00d2ff";ctx.shadowBlur=12;ctx.stroke();ctx.shadowBlur=0;

  // Etiquetas
  ctx.textAlign="center";
  for(let i=0;i<timeData.length;i++){
    const d=timeData[i],x=i*PX;
    if(d.getMinutes()===0&&d.getHours()%6===0){
      ctx.fillStyle="rgba(255,255,255,0.28)";ctx.font="8px -apple-system,sans-serif";
      ctx.fillText(fmtTime(d),x,H-4);ctx.fillStyle="rgba(255,255,255,0.2)";ctx.fillRect(x-0.5,H-14,1,3);
    }
    if(d.getHours()===12&&d.getMinutes()===0){
      ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="bold 10px -apple-system,sans-serif";ctx.fillText(fmtShort(d),x,H-25);
    }
  }
}

function updateUI(){
  if(!timeData.length)return;
  const sc=document.getElementById('scroll-container');
  let idx=Math.round((sc.scrollLeft+sc.clientWidth/2)/PX);
  idx=Math.max(0,Math.min(idx,timeData.length-1));
  const d=timeData[idx];
  document.getElementById('fecha').innerText=fmt(d);
  const m=moonCalc(d);
  document.getElementById('phase-name').innerText=m.txt.toUpperCase();
  document.getElementById('illum').innerText=m.illum+"%";
  drawMoon(m.p);
  updateMoonTimes(d);
  document.getElementById('p-hora').innerText=fmtTime(d);
  document.getElementById('p-alt').innerText="+"+Math.max(...marineData).toFixed(1)+" M";
  const next=extremesData.find(e=>e.dt*1000>d.getTime());
  document.getElementById('p-marea').innerText=next
    ?(next.type==="High"?"PLEAMAR":"BAJAMAR")+" "+fmtTime(new Date(next.dt*1000))
    :"--:--";
}

function scrollToNow(){
  if(!timeData.length)return;
  const now=new Date();let best=0,bd=Infinity;
  for(let i=0;i<timeData.length;i++){const dif=Math.abs(now-timeData[i]);if(dif<bd){bd=dif;best=i;}}
  const sc=document.getElementById('scroll-container');
  sc.scrollLeft=best*PX-sc.clientWidth/2;updateUI();
}

function initWithData(heights,times,extremes){
  marineData=heights;timeData=times;extremesData=extremes;
  renderTide();scrollToNow();
}

document.getElementById('scroll-container').addEventListener('scroll',()=>requestAnimationFrame(updateUI));
document.getElementById('btn-now').addEventListener('click',scrollToNow);
window.addEventListener('resize',()=>drawMoon(moonCalc(new Date()).p));

lunaImg.onload=()=>{
  const m=moonCalc(new Date());
  document.getElementById('phase-name').innerText=m.txt.toUpperCase();
  document.getElementById('illum').innerText=m.illum+"%";
  document.getElementById('fecha').innerText=fmt(new Date());
  drawMoon(m.p);updateMoonTimes(new Date());
};

fetch(`https://www.worldtides.info/api/v3?heights&extremes&days=7&lat=${LAT}&lon=${LON}&key=${API_KEY}`)
  .then(r=>{if(!r.ok)throw new Error('API '+r.status);return r.json();})
  .then(data=>{
    initWithData(data.heights.map(h=>h.height),data.heights.map(h=>new Date(h.dt*1000)),data.extremes);
  })
  .catch(err=>{
    console.warn('API no disponible:',err.message);
    const demo=generateDemoData();
    initWithData(demo.heights,demo.times,demo.extremes);
    document.getElementById('fecha').innerText=fmt(new Date())+" · DEMO";
  });
</script>
</body>
