<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina - Luna y Marea</title>
    <style>
        :root {
            --bg-color: #040b16;
            --text-main: #ffffff;
            --text-muted: #8ab4f8;
            --neon-blue: #00d2ff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #0d2240 0%, #040b16 70%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita scroll nativo */
        }

        header {
            text-align: center;
            padding: 20px 10px 10px;
            z-index: 10;
        }

        h1 { font-size: 14px; font-weight: 600; letter-spacing: 1px; color: var(--text-main); }
        #date-display { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-top: 5px; letter-spacing: 0.5px; }

        /* Contenedor de la Luna */
        .moon-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 20px;
        }

        .moon-visual {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f4f6f0, #88929e);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.15), inset -20px -20px 40px rgba(0,0,0,0.5);
            position: relative;
            margin-bottom: 25px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Sombra dinámica para la fase lunar */
        .moon-shadow {
            position: absolute;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: rgba(4, 11, 22, 0.85);
            border-radius: 50%;
            transition: transform 0.5s ease;
        }

        .phase-title { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 5px; }
        .phase-name { font-size: 22px; font-weight: 600; margin-bottom: 10px; letter-spacing: 1px; }
        .illumination { font-size: 16px; font-weight: 300; }

        /* Contenedor de Mareas interactivo */
        .tide-section {
            flex: 1;
            background: rgba(0, 40, 80, 0.2);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            backdrop-filter: blur(10px);
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.1);
            /* Importante para el gesto de deslizamiento */
            touch-action: pan-y; 
        }

        .tide-header { text-align: center; margin-bottom: 15px; }
        .tide-state { font-size: 26px; font-weight: bold; color: var(--neon-blue); letter-spacing: 1px; }

        /* Gráfico Canvas */
        .canvas-container {
            width: 100%;
            height: 120px;
            position: relative;
            margin-bottom: 20px;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* Paneles inferiores */
        .info-panels {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .panel {
            flex: 1;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
        }
        .panel-label { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; }
        .panel-value { font-size: 16px; font-weight: 600; }
        
        .swipe-hint {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 20px;
            color: rgba(255,255,255,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(0); opacity: 0.3; }
            50% { transform: translateX(-5px); opacity: 0.8; }
            100% { transform: translateX(0); opacity: 0.3; }
        }
    </style>
</head>
<body>

    <header>
        <h1>LAS PALMAS DE GRAN CANARIA</h1>
        <div id="date-display">CARGANDO FECHA...</div>
    </header>

    <div class="moon-section">
        <div class="moon-visual">
            <div class="moon-shadow" id="moon-shadow"></div>
        </div>
        <div class="phase-title">FASE LUNAR</div>
        <div class="phase-name" id="phase-name">CARGANDO...</div>
        <div class="illumination" id="illumination">--%</div>
    </div>

    <div class="tide-section" id="swipe-zone">
        <div class="swipe-hint">↔</div>
        <div class="tide-header">
            <div class="phase-title">ESTADO DE LA MAREA</div>
            <div class="tide-state" id="tide-state">--</div>
        </div>
        
        <div class="canvas-container">
            <canvas id="tide-canvas"></canvas>
        </div>

        <div class="info-panels">
            <div class="panel">
                <div class="panel-label">ACTUAL</div>
                <div class="panel-value" id="current-time">--:--</div>
            </div>
            <div class="panel">
                <div class="panel-label">SIGUIENTE</div>
                <div class="panel-value" id="next-tide">--:--</div>
            </div>
            <div class="panel">
                <div class="panel-label">ALTURA MÁX</div>
                <div class="panel-value" id="tide-height">-- M</div>
            </div>
        </div>
    </div>

    <script>
        // Variables Globales
        let offsetDays = 0; // 0 = Hoy, 1 = Mañana, etc.
        let marineData = null;
        
        // Configuración de Fechas
        const today = new Date();
        
        // Elementos del DOM
        const dateDisplay = document.getElementById('date-display');
        const phaseName = document.getElementById('phase-name');
        const illumination = document.getElementById('illumination');
        const moonShadow = document.getElementById('moon-shadow');
        const tideState = document.getElementById('tide-state');
        const currentTimeEl = document.getElementById('current-time');
        const nextTideEl = document.getElementById('next-tide');
        const tideHeightEl = document.getElementById('tide-height');
        const canvas = document.getElementById('tide-canvas');
        const ctx = canvas.getContext('2d');

        // Formateador de Fechas (SIEMPRE EN MAYÚSCULAS)
        function formatDate(dateObj) {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            return dateObj.toLocaleDateString('es-ES', options).toUpperCase();
        }

        // --- CÁLCULO ASTRONÓMICO DE LA LUNA ---
        function calculateMoon(date) {
            // Fecha base de Luna Nueva conocida
            const lp = 2551442.8769675; // Duración del ciclo lunar en ms
            const newMoon = new Date("1970-01-07T20:35:00.000Z").getTime();
            const phase = ((date.getTime() - newMoon) % lp) / lp;
            
            let phaseText = "";
            let illum = (0.5 * (1 - Math.cos(2 * Math.PI * phase))) * 100;
            
            if (phase < 0.03 || phase > 0.97) phaseText = "LUNA NUEVA";
            else if (phase < 0.22) phaseText = "CRECIENTE";
            else if (phase < 0.28) phaseText = "CUARTO CRECIENTE";
            else if (phase < 0.47) phaseText = "GIBOSA CRECIENTE";
            else if (phase < 0.53) phaseText = "LUNA LLENA";
            else if (phase < 0.72) phaseText = "GIBOSA MENGUANTE";
            else if (phase < 0.78) phaseText = "CUARTO MENGUANTE";
            else phaseText = "MENGUANTE";

            return { text: phaseText, illum: illum.toFixed(0), phaseValue: phase };
        }

        // --- DIBUJAR LUNA ---
        function drawMoon(phaseValue) {
            // Animación CSS simple para simular la sombra de la fase
            let xOffset = 100 - (phaseValue * 200); 
            moonShadow.style.transform = `translateX(${xOffset}%)`;
        }

        // --- API MAREAS (Open-Meteo Marine) ---
        async function fetchMarineData() {
            // Coordenadas aproximadas de Las Palmas
            const lat = 28.12;
            const lon = -15.43;
            const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=ocean_height&timezone=auto`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                marineData = data.hourly;
                updateApp();
            } catch (error) {
                console.error("Error cargando datos", error);
                tideState.innerText = "ERROR DE CONEXIÓN";
            }
        }

        // --- MOTOR DE DIBUJO Y ACTUALIZACIÓN ---
        function updateApp() {
            if(!marineData) return;

            // Calcular fecha activa
            const activeDate = new Date();
            activeDate.setDate(today.getDate() + offsetDays);
            
            // Actualizar Textos
            dateDisplay.innerText = formatDate(activeDate);
            
            const moon = calculateMoon(activeDate);
            phaseName.innerText = moon.text;
            illumination.innerText = moon.illum + "%";
            drawMoon(moon.phaseValue);

            // Filtrar datos de marea para el día activo
            const dayString = activeDate.toISOString().split('T')[0];
            let dayHeights = [];
            let dayTimes = [];
            
            for(let i=0; i<marineData.time.length; i++) {
                if(marineData.time[i].startsWith(dayString)) {
                    dayHeights.push(marineData.ocean_height[i]);
                    dayTimes.push(new Date(marineData.time[i]));
                }
            }

            // Encontrar Pleamar / Bajamar
            const maxVal = Math.max(...dayHeights);
            const minVal = Math.min(...dayHeights);
            const currentHourIndex = offsetDays === 0 ? new Date().getHours() : 12; // Si no es hoy, mostramos el medio día por defecto
            
            const currentHeight = dayHeights[currentHourIndex];
            
            if(currentHeight > (maxVal + minVal)/2) tideState.innerText = "PLEAMAR";
            else tideState.innerText = "BAJAMAR";

            tideHeightEl.innerText = (maxVal > 0 ? "+" : "") + maxVal.toFixed(1) + "M";
            
            const displayTime = offsetDays === 0 ? new Date() : dayTimes[currentHourIndex];
            currentTimeEl.innerText = displayTime.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();

            // Siguiente evento (Simplificado: buscamos el siguiente pico o valle)
            nextTideEl.innerText = "VER GRÁFICO"; 

            drawWave(dayHeights);
        }

        // --- DIBUJAR OLA EN CANVAS ---
        function drawWave(heights) {
            // Ajustar tamaño canvas por resolución de pantalla
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if(heights.length === 0) return;

            const minH = Math.min(...heights);
            const maxH = Math.max(...heights);
            const range = maxH - minH || 1;

            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            
            for(let i=0; i<heights.length; i++) {
                const x = (i / (heights.length - 1)) * canvas.width;
                // Normalizar altura al canvas (con algo de margen)
                const normalizedY = (heights[i] - minH) / range;
                const y = canvas.height - (normalizedY * (canvas.height - 40)) - 20; 
                ctx.lineTo(x, y);
            }
            
            ctx.lineTo(canvas.width, canvas.height);
            ctx.closePath();

            // Gradiente
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "rgba(0, 210, 255, 0.6)");
            gradient.addColorStop(1, "rgba(0, 40, 80, 0)");
            
            ctx.fillStyle = gradient;
            ctx.fill();

            // Línea brillante superior
            ctx.beginPath();
            for(let i=0; i<heights.length; i++) {
                const x = (i / (heights.length - 1)) * canvas.width;
                const normalizedY = (heights[i] - minH) / range;
                const y = canvas.height - (normalizedY * (canvas.height - 40)) - 20; 
                if(i===0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = "#00d2ff";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // --- CONTROL TÁCTIL (Gestos) ---
        let startX = 0;
        const swipeZone = document.getElementById('swipe-zone');

        swipeZone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
        });

        swipeZone.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            const diffX = startX - endX;

            if (Math.abs(diffX) > 50) { // Umbral de deslizamiento
                if (diffX > 0 && offsetDays < 6) {
                    // Deslizar izquierda = Día Siguiente
                    offsetDays++;
                    updateApp();
                } else if (diffX < 0 && offsetDays > 0) {
                    // Deslizar derecha = Día Anterior
                    offsetDays--;
                    updateApp();
                }
            }
        });

        // Inicializar app
        fetchMarineData();
    </script>
</body>
</html>
