<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina - Luna y Marea</title>
    <style>
        :root {
            --bg-color: #01040a;
            --text-main: #ffffff;
            --text-muted: #a0c3ff;
            --neon-blue: #00e5ff;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Animación de fondo en movimiento */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Night_Sky_with_Clouds.jpg');
            background-size: 200% 200%;
            animation: panBackground 60s linear infinite alternate;
        }

        @keyframes panBackground {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* Capa de oscurecimiento superior */
        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(1, 4, 10, 0.5) 0%, rgba(1, 4, 10, 0.9) 70%, #01040a 100%);
            z-index: -1; pointer-events: none;
        }

        header { text-align: center; padding: 30px 10px 10px; z-index: 10; position: relative; }
        h1 { font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        #date-display { font-size: 12px; font-weight: 500; color: var(--neon-blue); margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }

        /* Efecto de levitación para la luna */
        .moon-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .moon-visual {
            width: 190px; height: 190px; border-radius: 50%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
            background-size: cover; background-position: center;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.15), inset -20px -20px 50px rgba(0,0,0,0.9);
            position: relative; margin-bottom: 25px; overflow: hidden;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); box-shadow: 0 0 40px rgba(255,255,255,0.1); }
            50% { transform: translateY(-10px); box-shadow: 0 0 60px rgba(255,255,255,0.3); }
            100% { transform: translateY(0px); box-shadow: 0 0 40px rgba(255,255,255,0.1); }
        }

        .moon-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.8) 60%, rgba(0, 0, 0, 0) 100%);
            border-radius: 50%; transform: translateX(100%); transition: transform 0.3s ease-out;
        }

        .phase-name { font-size: 22px; font-weight: 700; margin-bottom: 5px; letter-spacing: 1.5px; text-transform: uppercase; text-shadow: 0 2px 15px rgba(0,0,0,0.8); }
        .illumination { font-size: 16px; font-weight: 400; color: rgba(255,255,255,0.7); }

        /* Marea y Glassmorphism */
        .tide-section {
            background: rgba(4, 15, 30, 0.4);
            border-top: 1px solid var(--card-border);
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 25px 0; position: relative; z-index: 10;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        
        .scroll-container {
            width: 100%; height: 150px; overflow-x: auto; overflow-y: hidden; 
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; position: relative;
            /* Mejora táctil */
            scroll-snap-type: x mandatory;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        canvas { height: 100%; display: block; scroll-snap-align: center; }

        .center-marker {
            position: absolute; top: 0; left: 50%; width: 2px; height: 150px;
            background: linear-gradient(to bottom, transparent, var(--neon-blue), transparent);
            pointer-events: none; z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Paneles con cristal esmerilado interactivo */
        .info-panels { display: flex; justify-content: space-between; gap: 12px; padding: 0 25px; margin-top: 15px; }
        .panel { 
            flex: 1; 
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); 
            border: 1px solid var(--card-border);
            border-radius: 20px; padding: 15px 5px; text-align: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: transform 0.2s, background 0.2s;
        }
        .panel:active { transform: scale(0.95); background: rgba(255,255,255,0.15); } /* Feedback táctil */

        .panel-label { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px;}
        .panel-value { font-size: 15px; font-weight: 700; text-transform: uppercase; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.3);}
        
        .swipe-hint { 
            text-align: center; font-size: 11px; color: var(--text-muted); margin-bottom: 10px; 
            letter-spacing: 3px; font-weight: 600; text-transform: uppercase;
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0% { opacity: 0.4; } 50% { opacity: 1; color: var(--neon-blue); } 100% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <header>
        <h1>LAS PALMAS DE GRAN CANARIA</h1>
        <div id="date-display">CARGANDO FECHA...</div>
    </header>

    <div class="moon-section">
        <div class="moon-visual"><div class="moon-shadow" id="moon-shadow"></div></div>
        <div class="phase-name" id="phase-name">...</div>
        <div class="illumination" id="illumination">--%</div>
    </div>

    <div class="tide-section">
        <div class="swipe-hint">← DESLIZA PARA EXPLORAR →</div>
        
        <div style="position: relative;">
            <div class="center-marker"></div>
            <div class="scroll-container" id="scroll-container">
                <canvas id="tide-canvas"></canvas>
            </div>
        </div>

        <div class="info-panels">
            <div class="panel"><div class="panel-label">HORA ACTUAL</div><div class="panel-value" id="current-time">--:--</div></div>
            <div class="panel"><div class="panel-label">PRÓXIMA MAREA</div><div class="panel-value" id="next-tide">--:--</div></div>
            <div class="panel"><div class="panel-label">ALTURA MAX</div><div class="panel-value" id="tide-height">--</div></div>
        </div>
    </div>

    <script>
        // Mantenemos exactamente el mismo script robusto de la versión anterior
        let marineData = []; let timeData = []; const today = new Date();
        const dateDisplay = document.getElementById('date-display');
        const phaseName = document.getElementById('phase-name');
        const illumination = document.getElementById('illumination');
        const moonShadow = document.getElementById('moon-shadow');
        const currentTimeEl = document.getElementById('current-time');
        const nextTideEl = document.getElementById('next-tide');
        const tideHeightEl = document.getElementById('tide-height');
        const canvas = document.getElementById('tide-canvas');
        const ctx = canvas.getContext('2d');
        const scrollContainer = document.getElementById('scroll-container');

        function formatDate(dateObj) {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            return dateObj.toLocaleDateString('es-ES', options).toUpperCase();
        }

        function calculateMoon(date) {
            const LUNAR_MONTH_MS = 2551442877; 
            const newMoon = new Date("2000-01-06T18:14:00.000Z").getTime();
            let phase = ((date.getTime() - newMoon) % LUNAR_MONTH_MS) / LUNAR_MONTH_MS;
            if (phase < 0) phase += 1;
            
            let phaseText = ""; let illum = (0.5 * (1 - Math.cos(2 * Math.PI * phase))) * 100;
            if (phase < 0.03 || phase > 0.97) phaseText = "LUNA NUEVA";
            else if (phase < 0.22) phaseText = "CRECIENTE";
            else if (phase < 0.28) phaseText = "CUARTO CRECIENTE";
            else if (phase < 0.47) phaseText = "GIBOSA CRECIENTE";
            else if (phase < 0.53) phaseText = "LUNA LLENA";
            else if (phase < 0.72) phaseText = "GIBOSA MENGUANTE";
            else if (phase < 0.78) phaseText = "CUARTO MENGUANTE";
            else phaseText = "MENGUANTE";

            return { text: phaseText, illum: illum.toFixed(0), phaseValue: phase };
        }

        function drawMoon(phaseValue) {
            let offset = (phaseValue * 200) - 100; 
            if(phaseValue > 0.5) offset = (phaseValue * 200) - 300; 
            moonShadow.style.transform = `translateX(${offset}%)`;
        }

        async function fetchMarineData() {
            const lat = 28.12; const lon = -15.43;
            const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=sea_level_height_msl&timezone=auto&past_days=1`;
            try {
                const response = await fetch(url);
                if(response.ok) {
                    const data = await response.json();
                    marineData = data.hourly.sea_level_height_msl;
                    timeData = data.hourly.time.map(t => new Date(t));
                    renderCanvas(); centerScrollOnNow();
                }
            } catch (error) { console.error("Error API"); }
        }

        const PX_PER_HOUR = 35; // Un poco más ancho para deslizar mejor

        function renderCanvas() {
            if(!marineData.length) return;
            canvas.width = marineData.length * PX_PER_HOUR; canvas.height = 150; 
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const validData = marineData.filter(v => v !== null);
            const minH = Math.min(...validData); const maxH = Math.max(...validData);
            const range = (maxH - minH) || 1;

            ctx.beginPath(); ctx.moveTo(0, canvas.height);
            for(let i=0; i<marineData.length - 1; i++) {
                if(marineData[i] === null) continue;
                const x0 = i * PX_PER_HOUR; const normalizedY0 = (marineData[i] - minH) / range;
                const y0 = canvas.height - (normalizedY0 * (canvas.height - 70)) - 40; 
                const x1 = (i + 1) * PX_PER_HOUR; const normalizedY1 = (marineData[i + 1] - minH) / range;
                const y1 = canvas.height - (normalizedY1 * (canvas.height - 70)) - 40; 
                const cp1x = x0 + (x1 - x0) / 2; const cp2x = x0 + (x1 - x0) / 2;
                if(i===0) ctx.moveTo(x0, y0);
                ctx.bezierCurveTo(cp1x, y0, cp2x, y1, x1, y1);
            }
            ctx.lineTo(canvas.width, canvas.height); ctx.closePath();

            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "rgba(0, 229, 255, 0.4)"); gradient.addColorStop(1, "rgba(0, 10, 30, 0)");
            ctx.fillStyle = gradient; ctx.fill();

            ctx.beginPath();
            for(let i=0; i<marineData.length - 1; i++) {
                if(marineData[i] === null) continue;
                const x0 = i * PX_PER_HOUR; const y0 = canvas.height - (((marineData[i] - minH) / range) * (canvas.height - 70)) - 40; 
                const x1 = (i + 1) * PX_PER_HOUR; const y1 = canvas.height - (((marineData[i + 1] - minH) / range) * (canvas.height - 70)) - 40; 
                const cp1x = x0 + (x1 - x0) / 2; const cp2x = x0 + (x1 - x0) / 2;
                if(i===0) ctx.moveTo(x0, y0);
                ctx.bezierCurveTo(cp1x, y0, cp2x, y1, x1, y1);
            }
            ctx.strokeStyle = "#00e5ff"; ctx.lineWidth = 3;
            ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 15; ctx.stroke(); ctx.shadowBlur = 0; 
            
            ctx.fillStyle = "white"; ctx.font = "bold 10px -apple-system, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            for(let i=1; i<marineData.length - 1; i++) {
                if(!marineData[i]) continue;
                const prev = marineData[i-1]; const curr = marineData[i]; const next = marineData[i+1];
                const x = i * PX_PER_HOUR; const y = canvas.height - (((curr - minH) / range) * (canvas.height - 70)) - 40; 
                const timeStr = timeData[i].toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();

                if(curr > prev && curr > next) {
                    ctx.fillText("PLEAMAR (" + timeStr + ")", x, y - 25); 
                    ctx.fillStyle = "#00e5ff"; ctx.fillText("+" + curr.toFixed(1) + "M", x, y - 12); ctx.fillStyle = "white";
                } else if (curr < prev && curr < next) {
                    ctx.fillText("BAJAMAR (" + timeStr + ")", x, y + 15); 
                    ctx.fillStyle = "#8ab4f8"; ctx.fillText(curr.toFixed(1) + "M", x, y + 28); ctx.fillStyle = "white";
                }
            }
        }

        function updateUIViaScroll() {
            if(!timeData.length) return;
            const centerScrollX = scrollContainer.scrollLeft + (scrollContainer.clientWidth / 2);
            let hoverIndex = Math.floor(centerScrollX / PX_PER_HOUR);
            if (hoverIndex < 0) hoverIndex = 0; if (hoverIndex >= timeData.length) hoverIndex = timeData.length - 1;
            const hoverDate = timeData[hoverIndex];
            
            dateDisplay.innerText = formatDate(hoverDate);
            const moon = calculateMoon(hoverDate);
            phaseName.innerText = moon.text; illumination.innerText = moon.illum + "%";
            drawMoon(moon.phaseValue);
            
            currentTimeEl.innerText = hoverDate.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase();
            
            const validData = marineData.filter(v => v !== null);
            tideHeightEl.innerText = "+" + Math.max(...validData).toFixed(1) + " M";
            
            let foundNext = false;
            for(let j = hoverIndex + 1; j < marineData.length - 1; j++) {
                const prev = marineData[j-1]; const curr = marineData[j]; const next = marineData[j+1];
                if (curr > prev && curr > next) {
                    nextTideEl.innerText = `PLEAMAR (${timeData[j].toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase()})`;
                    nextTideEl.style.color = "#00e5ff"; foundNext = true; break;
                } else if (curr < prev && curr < next) {
                    nextTideEl.innerText = `BAJAMAR (${timeData[j].toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}).toUpperCase()})`;
                    nextTideEl.style.color = "#8ab4f8"; foundNext = true; break;
                }
            }
            if(!foundNext) nextTideEl.innerText = "--:--";
        }

        function centerScrollOnNow() {
            const now = new Date(); let closestIndex = 0; let minDiff = Infinity;
            for(let i=0; i<timeData.length; i++) {
                const diff = Math.abs(now - timeData[i]);
                if(diff < minDiff) { minDiff = diff; closestIndex = i; }
            }
            const targetX = (closestIndex * PX_PER_HOUR) - (scrollContainer.clientWidth / 2);
            scrollContainer.scrollLeft = targetX;
            updateUIViaScroll();
        }

        scrollContainer.addEventListener('scroll', () => { requestAnimationFrame(updateUIViaScroll); });
        fetchMarineData();
    </script>
</body>
</html>
